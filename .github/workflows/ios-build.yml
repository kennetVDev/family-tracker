name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          architecture: arm64

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build iOS for simulator
        run: |
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          cd ios && pod install --repo-update
          cd ..
          
          # Run Flutter build first
          flutter build ios --simulator --no-codesign || true
          
          # Patch GeneratedPluginRegistrant.m to remove app_links after build attempt
          if [ -f ios/Runner/GeneratedPluginRegistrant.m ]; then
            sed -i '' 's/#import <app_links\/AppLinksPlugin.h>/REPLACE/g' ios/Runner/GeneratedPluginRegistrant.m
            sed -i '' 's/@import app_links;/\/\/ disabled/g' ios/Runner/GeneratedPluginRegistrant.m
            sed -i '' 's/\[AppLinksPlugin registerWithRegistrar:/\/\/ [AppLinksPlugin registerWithRegistrar:/g' ios/Runner/GeneratedPluginRegistrant.m
          fi
          
          # Rebuild after patching
          rm -rf build/ios/iphonesimulator/Runner.app
          flutter build ios --simulator --no-codesign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app