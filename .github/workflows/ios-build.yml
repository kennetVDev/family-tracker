name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          architecture: arm64

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build iOS for simulator
        run: |
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          cd ios && pod install --repo-update
          cd ..
          
          # Remove app_links from GeneratedPluginRegistrant.m
          rm -f ios/Runner/GeneratedPluginRegistrant.m
          
          # Create new GeneratedPluginRegistrant.m without app_links
          printf '%s\n' \
            '//' \
            '//  Generated file. Do not edit.' \
            '//' \
            '' \
            '// clang-format off' \
            '' \
            '#import "GeneratedPluginRegistrant.h"' \
            '' \
            '#if __has_include(<firebase_core/FLTFirebaseCorePlugin.h>)' \
            '#import <firebase_core/FLTFirebaseCorePlugin.h>' \
            '#else' \
            '@import firebase_core;' \
            '#endif' \
            '' \
            '#if __has_include(<firebase_messaging/FLTFirebaseMessagingPlugin.h>)' \
            '#import <firebase_messaging/FLTFirebaseMessagingPlugin.h>' \
            '#else' \
            '@import firebase_messaging;' \
            '#endif' \
            '' \
            '#if __has_include(<flutter_background_service_ios/FlutterBackgroundServicePlugin.h>)' \
            '#import <flutter_background_service_ios/FlutterBackgroundServicePlugin.h>' \
            '#else' \
            '@import flutter_background_service_ios;' \
            '#endif' \
            '' \
            '#if __has_include(<flutter_local_notifications/FlutterLocalNotificationsPlugin.h>)' \
            '#import <flutter_local_notifications/FlutterLocalNotificationsPlugin.h>' \
            '#else' \
            '@import flutter_local_notifications;' \
            '#endif' \
            '' \
            '#if __has_include(<geocoding_ios/GeocodingPlugin.h>)' \
            '#import <geocoding_ios/GeocodingPlugin.h>' \
            '#else' \
            '@import geocoding_ios;' \
            '#endif' \
            '' \
            '#if __has_include(<geolocator_apple/GeolocatorPlugin.h>)' \
            '#import <geolocator_apple/GeolocatorPlugin.h>' \
            '#else' \
            '@import geolocator_apple;' \
            '#endif' \
            '' \
            '#if __has_include(<google_maps_flutter_ios/FLTGoogleMapsPlugin.h>)' \
            '#import <google_maps_flutter_ios/FLTGoogleMapsPlugin.h>' \
            '#else' \
            '@import google_maps_flutter_ios;' \
            '#endif' \
            '' \
            '#if __has_include(<google_sign_in_ios/FLTGoogleSignInPlugin.h>)' \
            '#import <google_sign_in_ios/FLTGoogleSignInPlugin.h>' \
            '#else' \
            '@import google_sign_in_ios;' \
            '#endif' \
            '' \
            '#if __has_include(<path_provider_foundation/PathProviderPlugin.h>)' \
            '#import <path_provider_foundation/PathProviderPlugin.h>' \
            '#else' \
            '@import path_provider_foundation;' \
            '#endif' \
            '' \
            '#if __has_include(<shared_preferences_foundation/SharedPreferencesPlugin.h>)' \
            '#import <shared_preferences_foundation/SharedPreferencesPlugin.h>' \
            '#else' \
            '@import shared_preferences_foundation;' \
            '#endif' \
            '' \
            '#if __has_include(<url_launcher_ios/URLLauncherPlugin.h>)' \
            '#import <url_launcher_ios/URLLauncherPlugin.h>' \
            '#else' \
            '@import url_launcher_ios;' \
            '#endif' \
            '' \
            '@implementation GeneratedPluginRegistrant' \
            '' \
            '+ (void)registerWithRegistry:(NSObject<FlutterPluginRegistry>*)registry {' \
            '  [FLTFirebaseCorePlugin registerWithRegistrar:[registry registrarForPlugin:@"FLTFirebaseCorePlugin"]];' \
            '  [FLTFirebaseMessagingPlugin registerWithRegistrar:[registry registrarForPlugin:@"FLTFirebaseMessagingPlugin"]];' \
            '  [FlutterBackgroundServicePlugin registerWithRegistrar:[registry registrarForPlugin:@"FlutterBackgroundServicePlugin"]];' \
            '  [FlutterLocalNotificationsPlugin registerWithRegistrar:[registry registrarForPlugin:@"FlutterLocalNotificationsPlugin"]];' \
            '  [GeocodingPlugin registerWithRegistrar:[registry registrarForPlugin:@"GeocodingPlugin"]];' \
            '  [GeolocatorPlugin registerWithRegistrar:[registry registrarForPlugin:@"GeolocatorPlugin"]];' \
            '  [FLTGoogleMapsPlugin registerWithRegistrar:[registry registrarForPlugin:@"FLTGoogleMapsPlugin"]];' \
            '  [FLTGoogleSignInPlugin registerWithRegistrar:[registry registrarForPlugin:@"FLTGoogleSignInPlugin"]];' \
            '  [PathProviderPlugin registerWithRegistrar:[registry registrarForPlugin:@"PathProviderPlugin"]];' \
            '  [SharedPreferencesPlugin registerWithRegistrar:[registry registrarForPlugin:@"SharedPreferencesPlugin"]];' \
            '  [URLLauncherPlugin registerWithRegistrar:[registry registrarForPlugin:@"URLLauncherPlugin"]];' \
            '}' \
            '' \
            '@end' > ios/Runner/GeneratedPluginRegistrant.m
          
          flutter build ios --simulator --no-codesign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app