name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ios-build:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          architecture: arm64

      - name: Install dependencies
        run: |
          flutter pub get

      - name: Build iOS for simulator
        run: |
          rm -rf ios/Pods ios/Podfile.lock ios/.symlinks
          cd ios && pod install --repo-update
          cd ..
          
          # Fix app_links in GeneratedPluginRegistrant.m
          sed -i '' 's/#import <app_links\/AppLinksPlugin.h>/REPLACE_APP_LINKS_PLACEHOLDER/g' ios/Runner/GeneratedPluginRegistrant.m
          sed -i '' 's/@import app_links;/\/\/ app_links disabled/g' ios/Runner/GeneratedPluginRegistrant.m
          sed -i '' 's/REPLACE_APP_LINKS_PLACEHOLDER/\/\/ #import <app_links\/AppLinksPlugin.h>/g' ios/Runner/GeneratedPluginRegistrant.m
          sed -i '' 's/\[AppLinksPlugin registerWithRegistrar:/\/\/ [AppLinksPlugin registerWithRegistrar:/g' ios/Runner/GeneratedPluginRegistrant.m
          
          flutter build ios --simulator --no-codesign

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-simulator-build
          path: build/ios/iphonesimulator/Runner.app