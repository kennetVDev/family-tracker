name: family_tracker
description: "Family GPS tracking app with real-time location sharing and geofencing."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  
  # Supabase
  supabase_flutter: ^2.5.2
  
  # Google Maps
  google_maps_flutter: ^2.6.1
  
  # Location
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  
  # Firebase
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  
  # Utils
  go_router: ^14.2.0
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  uuid: ^4.4.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
