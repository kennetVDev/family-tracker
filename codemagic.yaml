workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.familytracker.app" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build iOS
        script: |
          flutter packages pub get
          flutter build ipa --release --verbose
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive

  android-workflow:
    name: Android Build
    max_build_duration: 45
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter build Android
        script: |
          flutter packages pub get
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-simulator-workflow:
    name: iOS Simulator Build (No Code Signing)
    max_build_duration: 45
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Flutter build iOS for simulator
        script: |
          flutter packages pub get
          # Remove app_links if causing issues
          flutter pub deps --no-dev 2>/dev/null | grep -q "app_links" && flutter pub remove app_links 2>/dev/null || true
          flutter build ios --simulator --no-codesign
      - name: Fix iOS build
        script: |
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ios/.symlinks
          cd ios && pod install --repo-update
    artifacts:
      - build/ios/iphonesimulator/*.app