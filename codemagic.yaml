workflows:
  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "com.familytracker.app" --type IOS_APP_STORE
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter build iOS
        script: |
          flutter packages pub get
          flutter build ipa --release --verbose
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/xcarchive/*.xcarchive

  android-workflow:
    name: Android Build
    max_build_duration: 45
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Flutter build Android
        script: |
          flutter packages pub get
          flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/*.apk

  ios-simulator-workflow:
    name: iOS Simulator Build (No Code Signing)
    max_build_duration: 45
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Recreate iOS folder and build
        script: |
          # Backup important iOS files
          cp -r ios/Runner/Info.plist /tmp/Info.plist.backup 2>/dev/null || true
          cp -r ios/Runner/Assets.xcassets /tmp/Assets.xcassets.backup 2>/dev/null || true
          
          # Delete ios folder
          rm -rf ios
          
          # Recreate ios folder with Flutter
          flutter create --platforms=ios .
          
          # Restore Info.plist (we need to add location permissions back)
          cat > ios/Runner/Info.plist << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
	<key>CFBundleDevelopmentRegion</key>
	<string>$(DEVELOPMENT_LANGUAGE)</string>
	<key>CFBundleDisplayName</key>
	<string>Family Tracker</string>
	<key>CFBundleExecutable</key>
	<string>$(EXECUTABLE_NAME)</string>
	<key>CFBundleIdentifier</key>
	<string>$(PRODUCT_BUNDLE_IDENTIFIER)</string>
	<key>CFBundleInfoDictionaryVersion</key>
	<string>6.0</string>
	<key>CFBundleName</key>
	<string>family_tracker</string>
	<key>CFBundlePackageType</key>
	<string>APPL</string>
	<key>CFBundleShortVersionString</key>
	<string>$(FLUTTER_BUILD_NAME)</string>
	<key>CFBundleSignature</key>
	<string>????</string>
	<key>CFBundleVersion</key>
	<string>$(FLUTTER_BUILD_NUMBER)</string>
	<key>LSRequiresIPhoneOS</key>
	<true/>
	<key>UILaunchStoryboardName</key>
	<string>LaunchScreen</string>
	<key>UIMainStoryboardFile</key>
	<string>Main</string>
	<key>UISupportedInterfaceOrientations</key>
	<array>
		<string>UIInterfaceOrientationPortrait</string>
		<string>UIInterfaceOrientationLandscapeLeft</string>
		<string>UIInterfaceOrientationLandscapeRight</string>
	</array>
	<key>NSLocationWhenInUseUsageDescription</key>
	<string>Family Tracker necesita tu ubicación para compartir tu posición con tu familia.</string>
	<key>NSLocationAlwaysAndWhenInUseUsageDescription</key>
	<string>Family Tracker necesita tu ubicación en segundo plano para notificaciones de llegada y salida.</string>
	<key>UIBackgroundModes</key>
	<array>
		<string>location</string>
		<string>fetch</string>
		<string>remote-notification</string>
	</array>
</dict>
</plist>
EOF
          
          # Update Podfile for minimum iOS version
          echo 'platform :ios, "14.0"' > ios/Podfile
          echo 'target "Runner" do' >> ios/Podfile
          echo '  use_frameworks!' >> ios/Podfile
          echo 'end' >> ios/Podfile
          echo '' >> ios/Podfile
          echo 'post_install do |installer|' >> ios/Podfile
          echo '  installer.pods_project.targets.each do |target|' >> ios/Podfile
          echo '    target.build_configurations.each do |config|' >> ios/Podfile
          echo '      config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "14.0"' >> ios/Podfile
          echo '    end' >> ios/Podfile
          echo '  end' >> ios/Podfile
          echo 'end' >> ios/Podfile
          
          # Now build
          flutter pub get
          rm -rf ios/Pods ios/Podfile.lock
          cd ios && pod install --repo-update
          cd ..
          flutter build ios --simulator --no-codesign
    artifacts:
      - build/ios/iphonesimulator/*.app